# haxvibe — local development environment
# Postgres + Auth + Storage is managed by Supabase cloud (free tier).
# This file runs only Redis (for BullMQ) locally.
# Api, worker, and web run via `pnpm dev` on the host (not containerized in dev).

services:
  redis:
    image: redis:7-alpine
    container_name: haxvibe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: ["redis-server", "--save", "20", "1", "--loglevel", "warning"]

  # Optional: local nuclei-runner for testing Cloud Run mode without deploying.
  # Enable with: docker compose --profile cloudrun up
  nuclei-runner:
    profiles: ["cloudrun"]
    build:
      context: .
      dockerfile: services/nuclei-runner/Dockerfile
    container_name: haxvibe-nuclei-runner
    ports:
      - "8090:8080"
    environment:
      - SCANNER_AUTH_TOKEN=local-dev-token-minimum-20chars
      - LOG_LEVEL=debug
      - NODE_ENV=development
    restart: unless-stopped

volumes:
  redis_data:
    name: haxvibe_redis_data

# The nuclei-outbound network is created by scripts/setup-nuclei-network.sh
# Nuclei containers are spawned dynamically by the worker process,
# they are NOT defined as services in this file.
networks:
  nuclei-outbound:
    name: nuclei-outbound
    external: true
